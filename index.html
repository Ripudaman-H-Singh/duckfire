<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckFire : BookClub Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root, [data-theme="dark"] {
            --bg-color: #2b1c11; /* Very deep, rich espresso background */
            --text-main: #f4eade; /* Warm parchment off-white for readability */
            --text-muted: #a88d75; /* Muted tan/clay for secondary text */
            --accent-color: #c48b36; /* Vibrant deep ochre/golden-brown for accents */
            --card-bg: #3a2718; /* Elevated warm leather color for the book cards */
            --border-color: #523924; /* Subtle, warm brown borders */
        }

        html {
            background-color: var(--bg-color) !important;
        }

        body {
            background-color: transparent !important;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            z-index: 0; 
        }

        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(12px);
            transform: scale(1.1);
            opacity: 0.25; 
            z-index: -1;
            pointer-events: none;
        }

        article {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            border-radius: 16px;
        }
        
        .rating-group { 
            display: flex; 
            flex-direction: row-reverse; 
            justify-content: flex-end; 
        }

        #details-modal article,
        #comments-modal article {
            width: 90vw;
            max-width: 1000px;
            min-height: 60vh;
            max-height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .book-cover {
            width: 60px;
            height: 90px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .book-cover {
                width: 100px;
                height: 150px; 
            }
            article {
                margin-bottom: 0.75rem !important;
            }
        }
    </style>
</head>
<body>
    <div id="dynamic-bg"></div>
    <div id="daily-book-banner" style="text-align: center; padding: 15px; color: var(--text-muted); font-size: 0.95rem; border-bottom: 1px solid var(--border-color); margin-bottom: 25px; background-color: var(--card-bg);">
        <span id="daily-date"></span> — <strong style="color: var(--text-main);" id="daily-title">Loading today's book...</strong> by <span id="daily-author"></span>
    </div>
    
    <main class="container">
        <nav style="margin-bottom: 2rem;">
            <ul>
                <li><h1 style="margin: 0; color: var(--text-main);">DuckFire : BookClub</h1></li>
            </ul>
            </nav>

        <p style="color: var(--text-muted); margin-bottom: 2rem;">Watcha Reading ?</p>
        <input 
            type="text" 
            id="reader-filter" 
            placeholder="Find reviews left by your friends..." 
            style="background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); margin-bottom: 2rem; border-radius: 8px; padding: 0.75rem;" 
        />
        
        <div id="book-list" style="display: flex; flex-direction: column; gap: 1rem;">
            </div>

        <dialog id="details-modal">
            <article>
                <header>
                    <a href="#close" aria-label="Close" class="close" id="close-details-btn"></a>
                    <h3 id="detail-title" style="color: var(--text-main);">Book Title</h3>
                </header>
                
                <div style="display: flex; gap: 20px; align-items: start; margin-bottom: 20px;">
                    <img id="detail-cover" src="" style="width: 120px; border-radius: 4px; display: none;" alt="Cover">
                    <div>
                        <p id="detail-author" style="color: var(--text-muted); margin-bottom: 10px;"></p>
                        <p id="detail-review" style="font-style: italic; color: var(--text-main);"></p>
                    </div>
                </div>

                <hr style="border-color: var(--border-color); margin: 20px 0;">

                <div id="long-review-display-container" style="display: none; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h4 style="margin: 0; color: var(--accent-color);">In-Depth Review</h4>
                        </div>
                    <p id="detail-long-review" style="white-space: pre-wrap; line-height: 1.6; color: var(--text-main);"></p>
                </div>
                
                </article>
        </dialog>

        <dialog id="comments-modal">
            <article>
                <header>
                    <a href="#close" aria-label="Close" class="close" id="close-comments-btn"></a>
                    <h3 style="color: var(--text-main);">Discussion Thread</h3>
                </header>
                <div id="comments-list" style="margin-bottom: 20px;"></div>
                
                </article>
        </dialog>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
